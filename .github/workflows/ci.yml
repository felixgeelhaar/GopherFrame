name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  security-events: write
  actions: read
  pages: write

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ['1.24', '1.25', '1.26']
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests
      run: |
        # Run all tests including examples
        go test -v -race ./...
        if [ $? -ne 0 ]; then
          echo "❌ Tests failed!"
          exit 1
        fi

        # Generate coverage only for pkg/ (exclude examples and cmd/)
        go test -v -race -coverprofile=coverage.out ./pkg/...
        if [ $? -ne 0 ]; then
          echo "❌ Coverage generation failed!"
          exit 1
        fi

    - name: Run property-based tests
      run: |
        go test -v -run TestProperty -count=3
        if [ $? -ne 0 ]; then
          echo "❌ Property-based tests failed!"
          exit 1
        fi

    - name: Install coverctl
      run: go install github.com/nicholasgasior/coverctl@latest
      continue-on-error: true

    - name: Check coverage with coverctl
      run: |
        if command -v coverctl &> /dev/null; then
          coverctl check --config .coverctl.yaml --from-profile --profile coverage.out || true
          echo "✅ coverctl check complete"
        else
          # Fallback to manual threshold check
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "📊 Current test coverage (pkg/): ${COVERAGE}%"
          THRESHOLD=60
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@0561704f0f02c16a585d4c7555e57fa2e44cf909 # v5.5.2
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.24'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        version: v2.7.2
        args: --timeout=5m

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

    - name: Download dependencies
      run: go mod download

    - name: Run benchmarks
      run: go test -bench=. -benchmem -run=^$ > benchmark.txt

    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
      with:
        tool: 'go'
        output-file-path: benchmark.txt
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '150%'
        fail-on-alert: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.24'

    - name: Install nox
      run: |
        curl -sSfL https://raw.githubusercontent.com/noxsecurity/nox/main/install.sh | sh -s -- -b /usr/local/bin || true
      continue-on-error: true

    - name: Run nox security scan (SAST + SCA)
      run: |
        if command -v nox &> /dev/null; then
          nox scan . --format sarif > nox-results.sarif 2>/dev/null || true
          nox scan . --format json > nox-results.json 2>/dev/null || true

          if [ ! -s nox-results.sarif ]; then
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"nox","informationUri":"https://github.com/noxsecurity/nox","version":"1.0.0","rules":[]}},"results":[]}]}' > nox-results.sarif
          fi

          echo "📋 nox scan complete"

          if grep -q '"severity":"critical"' nox-results.json 2>/dev/null; then
            echo "❌ Critical security findings detected!"
            exit 1
          fi
          echo "✅ No critical security findings"
        else
          echo "⚠️ nox not available, skipping security scan"
        fi
      continue-on-error: true

    - name: Upload nox SARIF to Code Scanning
      uses: github/codeql-action/upload-sarif@66b39da20ccc656acc90dd27ea30f5d458ec33ce # v3.28.19
      with:
        sarif_file: nox-results.sarif
        category: nox
      if: always() && hashFiles('nox-results.sarif') != ''
      continue-on-error: true

    - name: Upload nox scan artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: nox-security-results
        path: |
          nox-results.sarif
          nox-results.json
        retention-days: 30
      if: always()
      continue-on-error: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, lint, benchmark, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Install Relicta
      run: |
        curl -sSfL https://github.com/relicta-tech/relicta/releases/latest/download/relicta_linux_amd64.tar.gz -o relicta.tar.gz
        tar xzf relicta.tar.gz
        chmod +x relicta
        sudo mv relicta /usr/local/bin/

    - name: Run Relicta release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PLAN_OUTPUT=$(relicta plan --no-ai 2>&1)
        echo "$PLAN_OUTPUT"
        LEVEL=$(echo "$PLAN_OUTPUT" | grep "Release type:" | sed 's/.*: *\([a-z]*\).*/\1/')
        echo "Detected bump level: $LEVEL"
        relicta bump --level "$LEVEL"
        relicta notes
        relicta approve --yes --ci
        relicta publish --ci
