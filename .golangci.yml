version: "2"

run:
  timeout: 5m
  go: '1.24'

linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - ineffassign
    - staticcheck
    - unconvert
    - whitespace
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
          - unused

      - path: pkg/expr/
        text: "is unused"
        linters:
          - unused

      - path: cmd/
        linters:
          - errcheck
          - unused
          - staticcheck

      - path: pkg/domain/aggregation/
        linters:
          - staticcheck

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 100
  max-same-issues: 20
